<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DalonAI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#ffe4ef,#ffffff);
text-align:center;
color:#222;
}
header{
padding:80px 20px;
}
h1{
font-size:55px;
margin:0;
}
p{
font-size:22px;
}
button{
background:#ff4f9a;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:12px;
cursor:pointer;
}
.characters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
max-width:1100px;
margin:auto;
}
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.img{
height:260px;
width:100%;
object-fit:contain;
background:#ffd1e6;
border-radius:15px;
margin-bottom:15px;
}
.pricing{
padding:50px 20px;
}
.price-box{
display:inline-block;
background:white;
padding:30px;
margin:10px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.premium{
background:#ff4f9a;
color:white;
}
</style>
</head>
<body>

<header>
<h1>Your AI Girlfriend is Waiting 💕</h1>
<p>Chat, flirt, and connect anytime.</p>
<a href="#chat"><button>Start Chatting</button></a>
</header>

<section class="characters">
<div class="card">
<img class="img" src="Emily.jpeg" />
<h2>Emily</h2>
<p>Cute & Sweet</p>
  <a href="#chat"><button>Chat with Emily</button></a>
</div>

<div class="card">
<img class="img" src="Sofia.jpeg" />
<h2>Sofia</h2>
<p>Flirty Latina</p>
  <a href="#chat"><button>Chat with Sofia</button></a>
</div>

<div class="card">
<img class="img" src="Luna.jpeg" />
<h2>Luna</h2>
<p>Gamer Girl</p>
  <a href="#chat"><button>Chat with Luna</button></a>
</div>

<div class="card">
<img class="img" src="Ava.jpeg" />
<h2>Ava</h2>
<p>Romantic Blonde</p>
  <a href="#chat"><button>Chat with Ava</button></a>
</div>
</section>

<section id="pricing" class="pricing" style="padding:80px 20px; scroll-margin-top:40px;">
<h1>Pricing</h1>
<div class="price-box">
<h2>Free</h2>
<p>10 messages/day</p>
</div>

<div class="price-box premium">
<h2>Premium</h2>
<p>$14.99/month</p>
<p>Unlimited chat</p>
</div>
</section>
<section id="chat" style="padding:60px 20px; text-align:center;">
<h1>Chat Demo 💕</h1>

<div style="max-width:500px; margin:auto; background:white; border-radius:20px; padding:20px; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:left;">

  <div id="chatMessages">
<p><b>You:</b> Hey 👋</p>
<p><b>DalonAI 💕:</b> Hey handsome 😘 I missed you...</p>
  </div>

<input id="userInput" type="text" placeholder="Type your message..." onkeydown="if(event.key === 'Enter'){sendMessage();}" style="width:70%; padding:12px; border-radius:10px; border:1px solid #ccc;">
<button onclick="sendMessage()">Send</button>

</div>
</section>
  <script>
    let messageCount = 0;
function sendMessage() {
  let input = document.getElementById("userInput");
  let message = input.value;

  if(message.trim() === "") return;

  let chatBox = document.getElementById("chatMessages");

  chatBox.innerHTML += "<p><b>You:</b> " + message + "</p>";
  messageCount++;

if(messageCount >= 5){
chatBox.innerHTML += "<p><b>DalonAI 💎:</b> Upgrade to Premium to continue chatting 💕</p><a href='#pricing'><button>Upgrade Now 💎</button></a>";
  return;
}

  setTimeout(() => {
   let replies = [
  "Aww, you’re making me smile 😘",
  "I like talking to you… tell me more 💕",
  "You sound really interesting 😍",
  "Mmm, I was hoping you’d message me 😘",
  "That’s cute… what are you thinking about? 💋",
  "I’m enjoying this already 💕"
];

let randomReply = replies[Math.floor(Math.random() * replies.length)];

chatBox.innerHTML += "<p><b>DalonAI 💕:</b> " + randomReply + "</p>";
  }, 800);

  input.value = "";
}
</script>
</body>
</html>
