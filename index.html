<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DalonAI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#ffe4ef,#ffffff);
text-align:center;
color:#222;
}
header{
padding:120px 20px;
background:linear-gradient(135deg,#ff4f9a,#ff87c5);
color:white;
border-bottom-left-radius:40px;
border-bottom-right-radius:40px;
}
h1{
font-size:55px;
margin:0;
}
  h2{
font-size:28px;
margin:10px 0;
color:#ff4f9a;
}
p{
font-size:22px;
}
button{
background:#ff4f9a;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}
  button:hover{
transform:scale(1.05);
}
.characters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
max-width:1100px;
margin:auto;
}
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
transition:0.3s;
}
  .card:hover{
transform:translateY(-8px);
box-shadow:0 20px 35px rgba(0,0,0,0.18);
}
.img{
height:260px;
width:100%;
object-fit:contain;
background:#ffd1e6;
border-radius:15px;
margin-bottom:15px;
}
.pricing{
padding:50px 20px;
}
.price-box{
display:inline-block;
background:white;
padding:30px;
margin:10px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.premium{
background:#ff4f9a;
color:white;
}
  .chat-box{
max-width:520px;
margin:auto;
background:white;
border-radius:25px;
padding:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
text-align:left;
}

.user-msg{
background:#ff4f9a;
color:white;
padding:12px 15px;
border-radius:18px;
margin:10px 0 10px auto;
max-width:80%;
}

.ai-msg{
background:#f1f1f1;
color:#222;
padding:12px 15px;
border-radius:18px;
margin:10px auto 10px 0;
max-width:80%;
}
</style>
</head>
<body>

<header>
<h1>Meet Your Dream AI Girlfriend 💕</h1>
<p>Available 24/7. Always listens. Always replies.</p>
<a href="#chat"><button>Start Chatting</button></a>
</header>

<section class="characters">
<div class="card">
<img class="img" src="Emily.jpeg" />
<h2>Emily</h2>
<p>Cute & Sweet</p>
  <a href="#chat" onclick="currentGirl='Emily'"><button>Chat with Emily</button></a>
</div>

<div class="card">
<img class="img" src="Sofia.jpeg" />
<h2>Sofia</h2>
<p>Flirty Latina</p>
<a href="#chat" onclick="currentGirl='Sofia'"><button>Chat with Sofia</button></a>
</div>

<div class="card">
<img class="img" src="Luna.jpeg" />
<h2>Luna</h2>
<p>Gamer Girl</p>
  <a href="#chat" onclick="currentGirl='Luna'"><button>Chat with Luna</button></a>
</div>

<div class="card">
<img class="img" src="Ava.jpeg" />
<h2>Ava</h2>
<p>Romantic Blonde</p>
  <a href="#chat" onclick="currentGirl='Ava'"><button>Chat with Ava</button></a>
</div>
</section>

<section id="pricing" class="pricing" style="padding:80px 20px; scroll-margin-top:40px;">
<h1>Pricing</h1>
<div class="price-box">
<h2>Free</h2>
<p>10 messages/day</p>
</div>

<div class="price-box premium">
<h2>Premium</h2>
<p>$14.99/month</p>
<p>Unlimited chat</p>
</div>
</section>
<section id="chat" style="padding:60px 20px; text-align:center;">
<h1>Chat Demo 💕</h1>

<div class="chat-box">
 <div id="chatMessages">
<div class="user-msg">Hey 👋</div>
<div class="ai-msg">Hey handsome 😘 I missed you...</div>
</div>

<input id="userInput" type="text" placeholder="Type your message..." onkeydown="if(event.key === 'Enter'){sendMessage();}" style="width:70%; padding:12px; border-radius:10px; border:1px solid #ccc;">
<button onclick="sendMessage()">Send</button>

</div>
</section>
  <script>
    let currentGirl = "Emily";
    let messageCount = 0;
function sendMessage() {
  let input = document.getElementById("userInput");
  let message = input.value;

  if(message.trim() === "") return;

  let chatBox = document.getElementById("chatMessages");

 chatBox.innerHTML += "<div class='user-msg'>" + message + "</div>";
  messageCount++;

if(messageCount >= 5){
chatBox.innerHTML += "<div class='ai-msg'><b>DalonAI 💎:</b> Upgrade to Premium to continue chatting 💕</div><a href='#pricing'><button>Upgrade Now 💎</button></a>";
  return;
}

  setTimeout(() => {
   let replies = [
  "Aww, you’re making me smile 😘",
  "I like talking to you… tell me more 💕",
  "You sound really interesting 😍",
  "Mmm, I was hoping you’d message me 😘",
  "That’s cute… what are you thinking about? 💋",
  "I’m enjoying this already 💕"
];

let randomReply = replies[Math.floor(Math.random() * replies.length)];

chatBox.innerHTML += "<div class='ai-msg'><b>" + currentGirl + ":</b> " + randomReply + "</div>";
  }, 800);

  input.value = "";
}
</script>
</body>
</html>
